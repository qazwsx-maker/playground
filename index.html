<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>เจ้าวอมแบทขี้เกา 🐾</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(#aee0ff 0%, #cdeeff 100%);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  .wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 16px;
  }
  .score {
    font-size: clamp(20px, 5vw, 32px);
    font-weight: 800;
    color: #2f6b27;
    background: #ffffffcc;
    border: 3px solid #5fb84f;
    border-radius: 999px;
    padding: 8px 24px;
    box-shadow: 0 4px 0 #3f9a37;
    letter-spacing: 0.02em;
  }
  .stage { position: relative; line-height: 0; }
  canvas {
    width: min(92vw, 560px);
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #3f9a37;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    cursor: pointer;
    touch-action: manipulation;
  }
  .hint {
    font-size: clamp(13px, 3.5vw, 16px);
    color: #2f6b27;
    background: #ffffffaa;
    padding: 6px 16px;
    border-radius: 999px;
  }
  .pop {
    position: absolute;
    font-weight: 800;
    color: #ffeb3b;
    -webkit-text-stroke: 1.5px #b5820f;
    text-stroke: 1.5px #b5820f;
    font-size: 26px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: floatUp 0.7s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
    30%  { opacity: 1; transform: translate(-50%, -120%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -220%) scale(1); }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="score" id="score">🐾 คะแนน: 0</div>
    <div class="stage">
      <canvas id="scene" width="64" height="48"></canvas>
    </div>
    <div class="hint">แตะตัวเจ้าวอมแบทให้มันเกา! 🐾</div>
  </div>

<script>
const cv = document.getElementById('scene');
const ctx = cv.getContext('2d');
const scoreEl = document.getElementById('score');
const stage = document.querySelector('.stage');
const W = 64, H = 48;

let score = 0;
let scratch = false;
let scratchUntil = 0;

const COL = {
  sky: '#aee0ff', cloud: '#ffffff', sun: '#ffd84d',
  grass: '#5fb84f', grassDark: '#3f9a37', blade: '#2f7d2a',
  dark: '#3a2414', body: '#9a6334', bodyLt: '#b5824f',
  belly: '#e8c79a', eye: '#1a1208', white: '#ffffff',
  nose: '#2a1a10', paw: '#7a4a28', pink: '#d98c8c',
};

// fixed decor so nothing flickers between frames
const clouds = [[8, 6], [38, 9], [52, 5]];
const blades = [];
for (let x = 1; x < W; x += 3) blades.push([x, 30 + (x * 7 % 3)]);
const flowers = [[12, 41, '#ffe24d'], [30, 45, '#ffffff'], [49, 42, '#ff9ed2'], [22, 46, '#ffffff']];

function rect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }

function drawSun(cx, cy) {
  rect(cx - 2, cy - 1, 5, 3, COL.sun);
  rect(cx - 1, cy - 2, 3, 5, COL.sun);
  rect(cx - 4, cy, 1, 1, COL.sun); rect(cx + 4, cy, 1, 1, COL.sun);
  rect(cx, cy - 4, 1, 1, COL.sun); rect(cx, cy + 4, 1, 1, COL.sun);
}
function drawCloud(x, y) {
  rect(x, y, 9, 3, COL.cloud);
  rect(x + 2, y - 2, 5, 3, COL.cloud);
}

// wombat body contour: [localY, halfWidth], centered at local x = 16
const contour = [
  [3,6],[4,8],[5,9],[6,10],[7,10],[8,10],[9,10],[10,9],[11,9],
  [12,10],[13,11],[14,12],[15,12],[16,12],[17,12],[18,12],
  [19,11],[20,11],[21,10],[22,9],[23,7],[24,5]
];
const CX = 16;

function drawWombat(ox, oy, now) {
  const o = (x, y) => [ox + x, oy + y];

  // ears (behind head top)
  rect(ox + 10, oy + 1, 3, 4, COL.dark);
  rect(ox + 11, oy + 2, 1, 2, COL.pink);
  rect(ox + 19, oy + 1, 3, 4, COL.dark);
  rect(ox + 20, oy + 2, 1, 2, COL.pink);

  // dark silhouette
  for (const [y, hw] of contour) rect(ox + CX - hw, oy + y, 2 * hw, 1, COL.dark);
  // body fill (leaves top+bottom+sides dark = outline)
  for (const [y, hw] of contour) if (y > 3 && y < 24) rect(ox + CX - hw + 1, oy + y, 2 * hw - 2, 1, COL.body);
  // soft highlight on head
  rect(ox + CX - 4, oy + 4, 8, 1, COL.bodyLt);
  // belly
  for (const [y, hw] of contour) {
    if (y >= 13 && y <= 22) {
      const bhw = Math.min(hw - 3, 7);
      if (bhw > 0) rect(ox + CX - bhw, oy + y, 2 * bhw, 1, COL.belly);
    }
  }

  // eyes + highlight
  rect(ox + 11, oy + 6, 2, 3, COL.eye);
  rect(ox + 19, oy + 6, 2, 3, COL.eye);
  rect(ox + 11, oy + 6, 1, 1, COL.white);
  rect(ox + 19, oy + 6, 1, 1, COL.white);
  // nose
  rect(ox + 15, oy + 10, 2, 2, COL.nose);

  // front paws on belly
  rect(ox + 11, oy + 20, 4, 4, COL.paw);
  rect(ox + 17, oy + 20, 4, 4, COL.paw);
  rect(ox + 12, oy + 20, 1, 4, COL.dark);
  rect(ox + 18, oy + 20, 1, 4, COL.dark);

  // left hind foot (always down)
  rect(ox + 6, oy + 23, 5, 3, COL.body);
  rect(ox + 6, oy + 25, 5, 1, COL.dark);

  if (!scratch) {
    // right hind foot resting
    rect(ox + 21, oy + 23, 5, 3, COL.body);
    rect(ox + 21, oy + 25, 5, 1, COL.dark);
  } else {
    // right hind leg raised, scratching near the cheek/ear
    const wig = Math.round(Math.sin(now * 0.035) * 1);
    rect(ox + 24, oy + 15, 3, 6, COL.body);      // thigh
    rect(ox + 26, oy + 9, 2, 8, COL.body);       // shin
    rect(ox + 24, oy + 8 + wig, 3, 2, COL.paw);  // wiggling foot
    rect(ox + 24, oy + 8 + wig, 3, 1, COL.dark);
    // motion ticks
    rect(ox + 22, oy + 7 + wig, 1, 1, COL.white);
    rect(ox + 23, oy + 11, 1, 1, COL.white);
  }
}

function draw(now) {
  ctx.clearRect(0, 0, W, H);
  // sky
  rect(0, 0, W, H, COL.sky);
  drawSun(50, 9);
  clouds.forEach(([x, y]) => drawCloud(x, y));
  // grass
  rect(0, 30, W, H - 30, COL.grass);
  rect(0, 30, W, 1, COL.grassDark);
  blades.forEach(([x, y]) => rect(x, y, 1, 2, COL.blade));
  flowers.forEach(([x, y, c]) => { rect(x, y, 1, 1, c); rect(x, y - 1, 1, 1, c); });

  // idle bob when not scratching
  const bob = scratch ? 0 : Math.round(Math.sin(now / 600));
  drawWombat(16, 7 + bob, now);

  if (scratch && now > scratchUntil) scratch = false;
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// wombat hit box in scene coords
function hitWombat(sx, sy) {
  return sx >= 18 && sx <= 48 && sy >= 6 && sy <= 36;
}

function onTap(e) {
  const rectBox = cv.getBoundingClientRect();
  const cxp = (e.clientX ?? (e.touches && e.touches[0].clientX));
  const cyp = (e.clientY ?? (e.touches && e.touches[0].clientY));
  if (cxp == null) return;
  const sx = (cxp - rectBox.left) / rectBox.width * W;
  const sy = (cyp - rectBox.top) / rectBox.height * H;
  if (!hitWombat(sx, sy)) return;

  score++;
  scoreEl.textContent = '🐾 คะแนน: ' + score;
  scratch = true;
  scratchUntil = performance.now() + 750;

  const pop = document.createElement('div');
  pop.className = 'pop';
  pop.textContent = '+1';
  pop.style.left = (cxp - rectBox.left) + 'px';
  pop.style.top = (cyp - rectBox.top) + 'px';
  stage.appendChild(pop);
  setTimeout(() => pop.remove(), 700);
}

cv.addEventListener('pointerdown', onTap);
</script>
</body>
</html>
